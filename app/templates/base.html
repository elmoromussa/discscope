<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DiscScope{% endblock %}</title>
  <link rel="stylesheet" href="{{ request.url_for('static', path='/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner container">
      <h1 class="site-title"><a href="{{ request.url_for('index') }}">DiscScope</a></h1>
      <div class="header-actions">
        <button type="button" class="btn btn-theme" id="theme-toggle" title="Canviar tema">Tema</button>
        <nav class="site-nav">
          <ul class="nav-list">
            <li><a href="{{ request.url_for('index') }}" class="{% if request.url.path == '/' %}active{% endif %}">Inici</a></li>
            <li><a href="{{ request.url_for('search_route') }}" class="{% if request.url.path == '/search' %}active{% endif %}">Cercar</a></li>
            <li><a href="{{ request.url_for('duplicates_route') }}" class="{% if request.url.path == '/duplicates' %}active{% endif %}">Duplicats</a></li>
            <li><a href="{{ request.url_for('extensions_route') }}" class="{% if request.url.path == '/extensions' %}active{% endif %}">Extensions</a></li>
            <li><a href="{{ request.url_for('folders_route') }}" class="{% if request.url.path == '/folders' %}active{% endif %}">Carpetes</a></li>
            <li><a href="{{ request.url_for('explorador_route') }}" class="{% if request.url.path == '/explorador' %}active{% endif %}">Explorador</a></li>
            <li><a href="{{ request.url_for('discs_route') }}" class="{% if request.url.path == '/discs' %}active{% endif %}">Discs</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="container">
      <span>DiscScope</span>
      <a href="{{ request.url_for('health') }}">Estat de la base de dades</a>
    </div>
  </footer>
  <script src="{{ request.url_for('static', path='/app.js') }}"></script>
  <script>
    var themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
      themeToggle.addEventListener('click', function () {
        window.inventariToggleTheme && window.inventariToggleTheme();
      });
    }
  </script>
</body>
</html>
